{% extends 'generic/object.html' %}
{% load helpers %}
{% block content %}
<div class="row">
  <div class="col col-md-6">
    <div class="card">
      <h2 class="card-header">Gateway Group Member</h2>
      <table class="table table-hover attr-table">
        <tr><th scope="row">Group</th><td>{{ object.group|linkify }}</td></tr>
        <tr><th scope="row">Gateway</th><td>{{ object.gateway|linkify }}</td></tr>
        <tr><th scope="row">Tier</th><td>{{ object.tier }}</td></tr>
      </table>
    </div>
  </div>
  <div class="col col-md-6">
    {% include 'inc/panels/tags.html' %}
    {% include 'inc/panels/custom_fields.html' %}
  </div>
</div>
{% endblock %}
